# Project-root  /  gradle.properties
#
# JVM settings — give Gradle enough heap so KSP/Hilt/Compose compilers
# don't OOM on the GitHub runner (default runner has 7 GB RAM).
org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8 -XX:+UseParallelGC

# Use Gradle's parallel + cache features — speeds up CI builds.
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=false

# Required for AGP 8+ projects.
android.useAndroidX=true
android.nonTransitiveRClass=true

# Kotlin code style for the IDE.
kotlin.code.style=official
